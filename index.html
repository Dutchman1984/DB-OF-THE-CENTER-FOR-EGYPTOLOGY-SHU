<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>上海大学埃及学研究中心数据库 | CENTER FOR EGYPTOLOGY, SHANGHAI UNIVERSITY</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background-color: #FAF6F0; background-image: url('bg-hieroglyphs.png'); background-repeat: repeat; background-size: 900px auto; position: relative; }
    #root { position: relative; z-index: 1; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4C5B0; border-radius: 3px; }
    @keyframes corpusSpin { to { transform: rotate(360deg); } }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @font-face {
      font-family: 'GentiumCorpus';
      src: url('fonts/gentium/Gentium-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GentiumCorpus';
      src: url('fonts/gentium/Gentium-Italic.woff2') format('woff2');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'GentiumCorpus';
      src: url('fonts/gentium/Gentium-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GentiumCorpus';
      src: url('fonts/gentium/Gentium-BoldItalic.woff2') format('woff2');
      font-weight: 700;
      font-style: italic;
      font-display: swap;
    }
    .card-anim { animation: fadeInUp 0.3s ease both; }
    .hover-card { transition: all 0.2s ease; }
    .hover-card:hover {
      border-color: #C4956A !important;
      box-shadow: 0 4px 20px rgba(44,24,16,0.07);
      transform: translateY(-1px);
    }
    .search-input:focus { border-color: #C4956A; box-shadow: 0 0 0 3px rgba(196,149,106,0.12); }
    .match-hl { background: #C4956A22; padding: 1px 3px; border-radius: 2px; color: #8B4513; }
    :root {
      --corpus-translit-size: 14px;
      --corpus-translit-line-height: 1.75;
      --corpus-hiero-height: clamp(26px, 2.2vw, 34px);
    }
    .egyptological-transliteration {
      font-family: 'GentiumCorpus', 'Gentium Plus', 'Noto Serif', 'Times New Roman', serif;
      font-size: var(--corpus-translit-size);
      line-height: var(--corpus-translit-line-height);
      color: #5D4037;
      font-style: italic;
      font-variant-ligatures: none;
      text-rendering: optimizeLegibility;
    }
    .hiero-render-area {
      background: #FFFDF8; border: 1px solid #E8DCC8; border-radius: 8px;
      padding: 16px 20px; min-height: 50px; overflow-x: auto;
    }
    .hiero-render-area svg {
      display: inline-block;
      vertical-align: middle;
      margin: 2px 0;
      height: var(--corpus-hiero-height) !important;
      width: auto !important;
      max-width: none;
    }
    .official-hieroglyph-area {
      padding: 8px 12px;
      min-height: 42px;
    }
    .hiero-render-area .official-hieroglyph-svg {
      display: block;
      height: var(--corpus-hiero-height);
      width: auto;
      max-width: none;
      object-fit: contain;
    }
    .hiero-error {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: #B71C1C; background: #FFF3F3; padding: 8px 12px;
      border-radius: 4px; border: 1px solid #FFCDD2;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    // ═══════════════════════════════════════════════════════════
    // ██  在此填入你的 Supabase 配置（anon key，不是 service_role）
    // ═══════════════════════════════════════════════════════════
    const SUPABASE_URL  = window.CORPUS_SUPABASE_URL || "https://api.shu-egyptology-db.site";
    const SUPABASE_KEY  = window.CORPUS_SUPABASE_KEY || "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhaXNxZWl0YW94bGtxcmF0aXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjYxMTcsImV4cCI6MjA5MjU0MjExN30.Eoz9MGwtdkDY2IYh1bv3Dk4UYZk-kCXBWXPtzfA4XzQ";
    const HIEROGLYPH_ASSET_BASE = window.CORPUS_HIEROGLYPH_ASSET_BASE
      || `${SUPABASE_URL}/storage/v1/object/public/hieroglyph-render`;
    // ═══════════════════════════════════════════════════════════

    // ── 轻量 Supabase 客户端（不引入完整 SDK，减少加载体积）──
    const sb = {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "return=representation"
      },
      async rpc(fnName, params) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fnName}`, {
          method: "POST", headers: this.headers, body: JSON.stringify(params)
        });
        if (!res.ok) throw new Error(`RPC ${fnName} failed: ${res.status}`);
        return res.json();
      },
      async from(table, { select = "*", filters = {}, order, limit, range } = {}) {
        let url = `${SUPABASE_URL}/rest/v1/${table}?select=${encodeURIComponent(select)}`;
        for (const [col, val] of Object.entries(filters)) {
          url += `&${col}=eq.${encodeURIComponent(val)}`;
        }
        if (order) url += `&order=${order}`;
        if (limit) url += `&limit=${limit}`;
        const headers = { ...this.headers };
        if (range) headers.Range = `${range[0]}-${range[1]}`;
        const res = await fetch(url, { headers });
        if (!res.ok) throw new Error(`Query ${table} failed: ${res.status}`);
        return res.json();
      }
    };

    async function fetchAllRows(table, options = {}) {
      const pageSize = 1000;
      const rows = [];
      for (let from = 0; ; from += pageSize) {
        const page = await sb.from(table, {
          ...options,
          range: [from, from + pageSize - 1]
        });
        rows.push(...page);
        if (page.length < pageSize) break;
      }
      return rows;
    }

    // ═══════════════════════════════════════════════════════
    //  JSesh MdC 预处理：清除 jsesh.umd.js 解析器不支持的语法
    // ═══════════════════════════════════════════════════════
    function expandShadingToggles(mdc) {
      let shading = false;
      return mdc.split(/(#b\b|#e\b)/g).map(part => {
        if (part === "#b") { shading = true; return " "; }
        if (part === "#e") { shading = false; return " "; }
        if (!shading) return part;
        return part.replace(/([^\s-]+)(?=\s|-|$)/g, token => {
          if (!token || /^#/.test(token) || /#[1-4]+$/.test(token)) return token;
          return `${token}#1234`;
        });
      }).join("");
    }

    function normalizeShadeSymbols(mdc) {
      return mdc
        .replace(/(^|[\s\-:*()])v\//g, "$1//")
        .replace(/(^|[\s\-:*()])h\//g, "$1//")
        .replace(/(^|[\s\-:*()])\/(?!\/)/g, "$1//");
    }

    function normalizeShadeCodes(mdc) {
      return mdc.replace(/#([1-4]+)/g, (_, digits) => {
        const normalized = Array.from(new Set(digits.split("").sort())).join("");
        return normalized ? `#${normalized}` : "";
      });
    }

    function normalizeGlyphVariants(mdc) {
      return mdc.replace(/[A-Za-z][A-Za-z0-9@]*/g, token => {
        if (/^LACUNA$/i.test(token)) return "//";
        if (!window.signsSizes || window.signsSizes[token]) return token;
        let base = token;
        while (base.length > 1 && !window.signsSizes[base] && /[A-Z]$/.test(base)) {
          base = base.slice(0, -1);
        }
        return window.signsSizes[base] ? base : token;
      }).replace(/(?<!#)\b[1-9]\b/g, digit => {
        const code = `Z${digit}`;
        return window.signsSizes && window.signsSizes[code] ? code : digit;
      });
    }

    function preprocessMdC(mdc) {
      if (!mdc) return "";
      let s = mdc;
      s = s.replace(/\|[^\s-]+(?:\s*-\s*)?/g, '');       // 移除行号/上标 |04 -、|x+3 -
      s = s.replace(/\{\{[^}]*\}\}/g, '');               // 移除 {{x,y,scale}}
      s = s.replace(/_?\*\*/g, '*');                     // ** → *
      s = s.replace(/\\[A-Za-z]+[0-9]*/g, '');           // 移除 \R270 等桌面版 JSesh 指令
      s = s.replace(/\\[0-9]+/g, '');                    // 移除 \97 等旋转指令
      s = expandShadingToggles(s);                       // #b/#e → 区间内象限阴影
      s = s.replace(/-?#b\b/g, '');                       // 清理残留阴影开关
      s = s.replace(/-?#e\b/g, '');
      s = normalizeShadeSymbols(s);                       // v/ h/ / → 可渲染阴影块
      s = normalizeShadeCodes(s);                         // #43 → #34，保证解析器可读
      s = s.replace(/\$[rb]?/g, '');                       // 移除颜色/黑红开关
      s = s.replace(/\?+/g, '//');                         // 缺损开关近似为阴影块
      s = normalizeGlyphVariants(s);                       // N33AV → N33A/N33，LACUNA → //
      // 王名框：< → <-  > → ->  但不干扰已有的 <- ->
      s = s.replace(/<(?!-)/g, '<-');
      s = s.replace(/(?<!-)>/g, '->');
      // ★ 核心修复：数据库用空格分隔符号组，JSesh 要求用 - 连字符
      s = s.replace(/\s+/g, '-');
      // 清理：多个连字符合并
      s = s.replace(/-{2,}/g, '-');
      // 清理：王名框内部不要多余连字符
      s = s.replace(/<-+-/g, '<-');
      s = s.replace(/-+->/g, '->');
      // 清理：首尾连字符
      s = s.replace(/^-+|-+$/g, '');
      return s;
    }

    function walkSvgTree(node, visit) {
      if (!node) return;
      visit(node);
      const children = node.children || node.childNodes || [];
      for (let i = 0; i < children.length; i++) walkSvgTree(children[i], visit);
    }

    function tagNameOf(node) {
      return String(node.tagName || node.nodeName || '').toLowerCase();
    }

    function getSvgAttr(node, name) {
      return node.getAttribute ? node.getAttribute(name) : node.attributes?.[name];
    }

    function setSvgAttr(node, name, value) {
      if (node.setAttribute) node.setAttribute(name, value);
      else if (node.attributes) node.attributes[name] = value;
    }

    const HIERO_SHADE_FILL = "#CFC8BF";
    const HIERO_SHADE_OPACITY = "0.55";

    function applyHieroglyphicSvgEnhancements(root) {
      const svgs = [];
      walkSvgTree(root, node => {
        if (tagNameOf(node) === "svg") svgs.push(node);
      });
      svgs.forEach(svg => {
        const shadeRects = [];
        walkSvgTree(svg, node => {
          if (tagNameOf(node) !== "rect") return;
          const style = getSvgAttr(node, "style") || "";
          const fill = getSvgAttr(node, "fill") || "";
          const isShade = /fill\s*:\s*rgb\(100,\s*100,\s*100\)/i.test(style)
            || /rgb\(100,\s*100,\s*100\)/i.test(fill)
            || /^#(?:646464|666666|808080)$/i.test(fill.trim())
            || /gray|grey/i.test(fill)
            || getSvgAttr(node, "data-jsesh-shade");
          if (isShade) shadeRects.push(node);
        });
        shadeRects.forEach(node => {
          const parent = node.parentNode;
          if (parent && parent.firstChild !== node) parent.insertBefore(node, parent.firstChild);
          setSvgAttr(node, "fill", HIERO_SHADE_FILL);
          setSvgAttr(node, "style", `fill:${HIERO_SHADE_FILL};opacity:${HIERO_SHADE_OPACITY};stroke:none;pointer-events:none`);
          setSvgAttr(node, "data-jsesh-shade", "true");
        });
      });
    }

    function gardinerToMdC(searchGardiner) {
      const normalizeToken = (token) => {
        let code = token.replace(/[^A-Za-z0-9_]/g, "");
        if (/^LACUNA$/i.test(code)) return "//";
        if (/^[1-9]$/.test(code) && window.signsSizes?.[`Z${code}`]) return `Z${code}`;
        if (!code || !window.signsSizes || window.signsSizes[code]) return code;
        let base = code;
        while (base.length > 1 && !window.signsSizes[base] && /[A-Z]$/.test(base)) {
          base = base.slice(0, -1);
        }
        return window.signsSizes[base] ? base : code;
      };
      return (searchGardiner || "")
        .split(/\s+/)
        .map(g => g.trim())
        .filter(g => g && g !== "\\t")
        .map(normalizeToken)
        .filter(Boolean)
        .map(g => g.includes("_") ? g.split("_").filter(Boolean).join("&") : g)
        .join("-");
    }

    // ═══════════════════════════════════════════════════════
    //  JSesh SVG 渲染组件
    // ═══════════════════════════════════════════════════════
    const jseshLib = window["jsesh-library"];

    function storageObjectUrl(relativePath) {
      const encodedPath = String(relativePath || "")
        .split("/").map(segment => encodeURIComponent(segment)).join("/");
      return `${HIEROGLYPH_ASSET_BASE}/${encodedPath}`;
    }

    function HieroglyphView({ svgPath, mdc, gardiner }) {
      const containerRef = useRef(null);
      const [status, setStatus] = useState("idle");
      const [svgRetry, setSvgRetry] = useState(0);
      const [svgFailed, setSvgFailed] = useState(false);
      const MAX_SVG_RETRIES = 2;

      useEffect(() => {
        setSvgRetry(0);
        setSvgFailed(false);
      }, [svgPath]);

      // JSesh 实时渲染：仅在无官方 SVG 路径时才允许降级
      useEffect(() => {
        if (svgPath) return;
        if (!containerRef.current || (!mdc && !gardiner) || !jseshLib) return;
        const el = containerRef.current;
        let cancelled = false;
        while (el.firstChild) el.removeChild(el.firstChild);
        setStatus("rendering");

        const cleaned = preprocessMdC(mdc);
        const fallback = gardinerToMdC(gardiner);
        if (!cleaned && !fallback) { setStatus("done"); return; }

        const render = async (code) => {
          el.textContent = code;
          await Promise.resolve(jseshLib.replaceTextWithHieroglyphs(el, { scale: 1.2 }));
          applyHieroglyphicSvgEnhancements(el);
        };

        (async () => {
          try {
            await render(cleaned || fallback);
            if (!cancelled) setStatus("done");
          } catch (err) {
            if (fallback && fallback !== cleaned) {
              try {
                await render(fallback);
                if (!cancelled) setStatus("fallback");
                return;
              } catch (fallbackErr) {
                err = fallbackErr;
              }
            }
            if (cancelled) return;
            console.warn("JSesh render error:", err, "\nMdC:", cleaned.substring(0, 200));
            el.textContent = "";
            const fb = document.createElement("div");
            fb.className = "hiero-error";
            fb.textContent = "渲染异常 · 预处理编码: " + (cleaned || fallback).substring(0, 300);
            el.appendChild(fb);
            setStatus("error");
          }
        })();

        return () => { cancelled = true; };
      }, [svgPath, mdc, gardiner]);

      // 有官方 SVG → 始终使用，加载失败时重试，绝不降级到 JSesh
      if (svgPath) {
        if (svgFailed) {
          return (
            <div className="hiero-render-area official-hieroglyph-area">
              <div className="hiero-error">
                官方象形文字 SVG 加载失败（已重试 {MAX_SVG_RETRIES} 次）；为避免错误方向或版式，本行不降级渲染。
                <button type="button" onClick={() => { setSvgRetry(0); setSvgFailed(false); }}
                  style={{ marginLeft:10, border:"1px solid #B71C1C", borderRadius:4,
                    background:"#FFF", color:"#B71C1C", padding:"3px 8px", cursor:"pointer" }}>
                  重试官方 SVG
                </button>
              </div>
            </div>
          );
        }
        const imgUrl = svgRetry > 0
          ? storageObjectUrl(svgPath) + "?r=" + svgRetry
          : storageObjectUrl(svgPath);
        const stillRetrying = svgRetry > 0 && svgRetry <= MAX_SVG_RETRIES;
        return (
          <div className="hiero-render-area official-hieroglyph-area">
            {stillRetrying && (
              <div style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0",
                fontFamily:"'JetBrains Mono',monospace", fontSize:12, color:"#8B7355" }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:"#C4956A",
                  animation:"corpusSpin 0.8s linear infinite" }} />
                象形文字加载中...
              </div>
            )}
            <img key={svgRetry}
              className="official-hieroglyph-svg"
              src={imgUrl}
              alt="JSesh official SVG hieroglyphic line"
              decoding="async"
              style={stillRetrying ? { display:"none" } : {}}
              onError={() => {
                if (svgRetry < MAX_SVG_RETRIES) {
                  setSvgRetry(c => c + 1);
                } else {
                  setSvgFailed(true);
                }
              }} />
          </div>
        );
      }

      // 无 svgPath → JSesh 实时渲染（保留原逻辑）
      if (!jseshLib) {
        return <div className="hiero-error">JSesh 渲染引擎未加载 — 请确保 jsesh.umd.js 和 images/glyphs/ 目录已部署</div>;
      }

      return (
        <div>
          {status === "rendering" && (
            <div style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0",
              fontFamily:"'JetBrains Mono',monospace", fontSize:12, color:"#8B7355" }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:"#C4956A",
                animation:"corpusSpin 0.8s linear infinite" }} />
              渲染圣书体中...
            </div>
          )}
          {status === "fallback" && (
            <div style={{ marginBottom:8, fontFamily:"'JetBrains Mono',monospace",
              fontSize:11, color:"#8B7355" }}>
              已使用 Gardiner 符号序列降级渲染
            </div>
          )}
          <div ref={containerRef} className="hiero-render-area" />
        </div>
      );
    }

    // ── 样式常量 ──
    const S = {
      tag: (c) => ({ display:"inline-block", padding:"4px 10px", borderRadius:4, fontSize:11,
        fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.04em",
        background:`${c}15`, color:c, border:`1px solid ${c}30` }),
      matchTag: (field) => {
        const map = {
          transliteration_fts: ["转写(精确)", "#2E7D32"],
          transliteration: ["转写", "#558B2F"],
          translation_zh: ["中文", "#C62828"],
          search_gardiner: ["Gardiner", "#6A1B9A"],
        };
        const [label, color] = map[field] || [field, "#8B7355"];
        return { display:"inline-block", padding:"3px 8px", borderRadius:4, fontSize:10,
          fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.04em",
          background:`${color}12`, color, border:`1px solid ${color}30`, fontWeight:600 };
      },
      section: { fontSize:11, fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.1em",
        textTransform:"uppercase", color:"#8B7355", marginBottom:6, marginTop:24,
        borderBottom:"1px solid #E8DCC8", paddingBottom:6 },
      input: { width:"100%", boxSizing:"border-box", padding:"14px 18px",
        border:"1px solid #D4C5B0", borderRadius:8, fontSize:15,
        fontFamily:"'Cormorant Garamond',serif", background:"#FFFCF7", color:"#2C1810",
        outline:"none", transition:"border-color 0.2s, box-shadow 0.2s" },
      btn: (active) => ({ padding:"8px 18px",
        border:`1px solid ${active?"#C4956A":"#D4C5B0"}`, borderRadius:"20px",
        background:active?"#C4956A":"transparent", color:active?"#FFF":"#8B7355",
        fontSize:12, fontFamily:"'JetBrains Mono',monospace", cursor:"pointer",
        transition:"all 0.2s", whiteSpace:"nowrap" }),
    };

    const G = (name, ...docs) => ({ name, docs });
    const D = (name, ...aliases) => ({ name, aliases });
    const DOCUMENT_CATEGORY_TREE = [
      { id:"econ", name:"经济文献", color:"#C4956A", subs:[
        { name:"土地清册文献", docs:["韦伯纸草"] },
        { name:"税收文献", docs:["加德纳86号陶石片","大英博物馆10447号纸草","古拉布纸草残片","古拉布G号纸草残片",
          "毕尔盖石碑",D("卢浮宫皮革残片（节选）","卢浮皮革残片（节选）"),"哈里斯1号纸草（节选）","卢浮宫27151号纸草",

    function applyRound63LegalTaxonomyPatch() {
      const legal = DOCUMENT_CATEGORY_TREE.find(cat => cat.id === "legal");
      if (!legal) throw new Error("Round63 taxonomy patch: legal corpus missing");
      ROUND63_LEGAL_TAXONOMY_ADDITIONS.forEach(addition => {
        const sub = legal.subs.find(item => item.name === addition.sub);
        if (!sub) throw new Error(`Round63 taxonomy patch: subcategory missing: ${addition.sub}`);
        const target = addition.group
          ? sub.groups.find(item => item.name === addition.group)
          : sub;
        if (!target || !Array.isArray(target.docs)) {
          throw new Error(`Round63 taxonomy patch: target missing: ${addition.sub}/${addition.group || "docs"}`);
        }
        target.docs.push(...addition.docs);
      });
    }

    function normalizeDocumentName(name) {
      return String(name || "")
        .normalize("NFKC")
        .replace(/[《》〈〉“”"'\s·、，,。:：;；\-—–_]/g, "")
        .replace(/[()]/g, "")
        .replace(/[（）]/g, "")
        .replace(/號/g, "号")
        .replace(/紙草/g, "纸草")
        .replace(/陶片/g, "陶石片")
        .replace(/陶器片/g, "陶石片")
        .replace(/—/g, "");
    }

    function buildTaxonomyCorpusLookup() {
      const candidates = new Map();
      const addItem = (corpusId, item) => {
        const names = typeof item === "string"
          ? [item]
          : [item.name, ...(item.aliases || [])];
        names.forEach(name => {
          const key = normalizeDocumentName(name);
          if (!key) return;
          if (!candidates.has(key)) candidates.set(key, new Set());
          candidates.get(key).add(corpusId);
        });
      };
      DOCUMENT_CATEGORY_TREE.forEach(cat => {
        (cat.subs || []).forEach(sub => {
          if (sub.groups) {
            sub.groups.forEach(group => (group.docs || []).forEach(item => addItem(cat.id, item)));
          } else {
            (sub.docs || []).forEach(item => addItem(cat.id, item));
          }
        });
      });
      return new Map([...candidates.entries()]
        .filter(([, corpusIds]) => corpusIds.size === 1)
        .map(([name, corpusIds]) => [name, [...corpusIds][0]]));
    }

    const DOCUMENT_CORPUS_BY_TAXONOMY_NAME = buildTaxonomyCorpusLookup();
    window.DOCUMENT_CORPUS_BY_TAXONOMY_NAME = DOCUMENT_CORPUS_BY_TAXONOMY_NAME;

    const LITERARY_DOCUMENT_NAMES = new Set(["温阿蒙历险记", "遭受厄运的王子"]);

    function inferDocumentCorpus(chapter, sources = [], notes = []) {
      if (LITERARY_DOCUMENT_NAMES.has(chapter)) return "lit";
      const taxonomyCorpus = DOCUMENT_CORPUS_BY_TAXONOMY_NAME.get(normalizeDocumentName(chapter));
      if (taxonomyCorpus) return taxonomyCorpus;
      const sourceText = (Array.isArray(sources) ? sources : [sources]).join(" ");
      const notesText = (Array.isArray(notes) ? notes : [notes]).join(" ");
      if (/\bCA-ECON-v1\b/.test(notesText) || /\bE\d{2}[-_]/i.test(sourceText)) return "econ";
      if (/^\s*\d+-\d+/.test(sourceText) || /法律/.test(sourceText) || /\bCA-LEGAL\b/i.test(notesText)) return "legal";
      if (/经济|ECON/i.test(sourceText) || /经济|ECON/i.test(notesText)) return "econ";
      if (/文学|温阿蒙|王子/.test(sourceText) || /文学|温阿蒙|王子/.test(notesText)) return "lit";
      return "unknown";
    }

    function getDocumentKey(doc) {
      return `${doc?.corpusId || "unknown"}|||${doc?.chapter || ""}`;
    }

    function createChapterResolver(chapters) {
      const exact = new Map();
      const normalized = new Map();
      chapters.forEach(chap => {
        if (!chap.chapter) return;
        const corpusId = chap.corpusId || "unknown";
        exact.set(`${corpusId}|||${chap.chapter}`, chap);
        const key = `${corpusId}|||${normalizeDocumentName(chap.chapter)}`;
        if (!normalized.has(key)) normalized.set(key, []);
        normalized.get(key).push(chap);
      });
      return (corpusId, name) => {
        const exactKey = `${corpusId}|||${name}`;
        if (exact.has(exactKey)) return exact.get(exactKey);
        const matches = normalized.get(`${corpusId}|||${normalizeDocumentName(name)}`) || [];
        return matches.length === 1 ? matches[0] : null;
      };
    }

    function uniqueDocs(docs) {
      const seen = new Set();
      const out = [];
      docs.forEach(doc => {
        const key = getDocumentKey(doc);
        if (!doc || seen.has(key)) return;
        seen.add(key);
        out.push(doc);
      });
      return out;
    }

    function getTaxonomyDisplayName(item) {
      return typeof item === "string" ? item : item.name;
    }

    function getTaxonomyLookupNames(item) {
      if (typeof item === "string") return [item];
      return [item.name, ...(item.aliases || [])];
    }

    function resolveTaxonomyItem(resolveChapter, corpusId, item) {
      const taxonomyName = getTaxonomyDisplayName(item);
      return uniqueDocs(getTaxonomyLookupNames(item).map(name => {
        const chap = resolveChapter(corpusId, name);
        return chap ? { ...chap, taxonomyName, matchedTaxonomyName:name } : null;
      }).filter(Boolean));
    }

    function getSubDocs(sub) {
      return sub.groups ? uniqueDocs(sub.groups.flatMap(g => g.docs)) : uniqueDocs(sub.docs || []);
    }

    function getCatDocs(cat) {
      return uniqueDocs((cat.subs || []).flatMap(getSubDocs));
    }

    function buildImportedCategoryTree(chapters) {
      const resolveChapter = createChapterResolver(chapters);
      const matched = new Set();
      const tree = DOCUMENT_CATEGORY_TREE.map(cat => {
        const subs = cat.subs.map(sub => {
          if (sub.groups) {
            const groups = sub.groups.map(group => ({
              name: group.name,
              docs: uniqueDocs(group.docs.flatMap(item => {
                const docs = resolveTaxonomyItem(resolveChapter, cat.id, item);
                docs.forEach(chap => matched.add(getDocumentKey(chap)));
                return docs;
              }))
            })).filter(group => group.docs.length > 0);
            return { name: sub.name, groups };
          }
          const docs = uniqueDocs((sub.docs || []).flatMap(item => {
            const docs = resolveTaxonomyItem(resolveChapter, cat.id, item);
            docs.forEach(chap => matched.add(getDocumentKey(chap)));
            return docs;
          }));
          return { name: sub.name, docs };
        }).filter(sub => getSubDocs(sub).length > 0);
        return { ...cat, subs };
      }).filter(cat => getCatDocs(cat).length > 0);
      const uncategorized = chapters.filter(chap => !matched.has(getDocumentKey(chap)));
      return { tree, uncategorized };
    }

    function archiveSelectionKey(sel) {
      return `${sel.level}|${sel.catId ?? ""}|${sel.subIndex ?? ""}|${sel.groupIndex ?? ""}`;
    }

    function updateArchiveSelections(previous, selection) {
      const nextKey = archiveSelectionKey(selection);
      const exists = previous.some(item => archiveSelectionKey(item) === nextKey);
      if (exists) return previous.filter(item => archiveSelectionKey(item) !== nextKey);

      const compatible = previous.filter(item => {
        if (!selection.catId || item.catId !== selection.catId) return true;

        // A selected parent would make a narrower child filter appear ineffective.
        // Keep selections from other branches, but replace ancestors/descendants
        // on the branch currently being refined.
        if (selection.level === "cat") return false;
        if (item.level === "cat") return false;
        if (selection.level === "sub") {
          return !(item.level === "group" && item.subIndex === selection.subIndex);
        }
        if (selection.level === "group") {
          return !(item.level === "sub" && item.subIndex === selection.subIndex);
        }
        return true;
      });

      return [...compatible, selection];
    }

    function selectionMatches(selections, level, catId = null, subIndex = null, groupIndex = null) {
      const items = Array.isArray(selections) ? selections : [selections];
      return items.some(sel => sel && sel.level === level
        && (catId === null || sel.catId === catId)
        && (subIndex === null || sel.subIndex === subIndex)
        && (groupIndex === null || sel.groupIndex === groupIndex));
    }

    // ── 组件 ──

    function NotesSection({ notes, provenance, annotationMeta }) {
      // Round64 used notes for CA-ECON import metadata.  Round65 separates the
      // reader-facing annotation text from machine provenance while retaining
      // a legacy fallback during an atomic deployment.
      const legacyMetadata = !provenance && notes && notes.startsWith("CA-ECON-v1|")
        ? notes : "";
      const humanNotes = legacyMetadata ? "" : (notes || "");
      const provenanceText = provenance || legacyMetadata;
      const sourceAnnotations = Array.isArray(annotationMeta) ? annotationMeta : [];
      if (!humanNotes && !provenanceText) return null;
      const humanNoteLines = humanNotes
        ? humanNotes.split(/\s*(?=[①-⑳㉑-㉟㊱-㊿])/u).map(item => item.trim()).filter(Boolean)
        : [];

      const parts = provenanceText ? provenanceText.split("|") : [];
      const metadata = { source_line_id: parts[1] || "" };
      parts.slice(2).forEach(part => {
        const separator = part.indexOf("=");
        if (separator > 0) metadata[part.slice(0, separator)] = part.slice(separator + 1);
      });
      const labels = {
        source_line_id: "源行编号",
        category: "文献类别",
        gly: "Gly 文件",
        relation: "对应关系",
        lower_pdf: "转写译文 PDF 页",
        translation_group: "译文组",
      };
      const relationLabels = {
        exact_line: "逐行精确对应",
        grouped_translation: "多行共用译文",
        source_only: "仅源文",
      };
      const entries = Object.keys(labels)
        .filter(key => metadata[key])
        .map(key => [labels[key], key === "relation"
          ? (relationLabels[metadata[key]] || metadata[key]) : metadata[key]]);

      return (
        <>
          {humanNotes && (
            <>
              <div style={S.section}>注释</div>
              <div style={{ fontSize:11, color:"#5D4037", lineHeight:1.75 }}>
                {humanNoteLines.map((line, index) => (
                  <div key={`${index}-${line.slice(0, 12)}`}
                    style={{ whiteSpace:"pre-line", marginTop:index === 0 ? 0 : 5 }}>
                    {line}
                  </div>
                ))}
              </div>
              {sourceAnnotations.length > 0 && (
                <details style={{ marginTop:10 }}>
                  <summary style={{ fontSize:10, color:"#A09080", cursor:"pointer" }}>
                    注释版本与页码（{sourceAnnotations.length}条，点击展开）
                  </summary>
                  <div style={{ marginTop:8, display:"grid", rowGap:6 }}>
                    {sourceAnnotations.map(item => {
                      const source = item.source || {};
                      const display = item.display || {};
                      return (
                        <div key={item.annotation_id} style={{ fontSize:10,
                          color:"#6D5A4A", fontFamily:"'JetBrains Mono',monospace",
                          overflowWrap:"anywhere" }}>
                          {display.web_marker || "•"} 书中{source.book_marker || "—"}
                          {source.printed_page ? ` · 印刷页 ${source.printed_page}` : ""}
                          {source.pdf_page ? ` · PDF 第 ${source.pdf_page} 页` : ""}
                        </div>
                      );
                    })}
                  </div>
                </details>
              )}
            </>
          )}

          {provenanceText && (
            <details style={{ marginTop:16 }}>
              <summary style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace",
                letterSpacing:"0.08em", color:"#8B7355", cursor:"pointer",
                borderTop:"1px solid #E8DCC8", paddingTop:10 }}>
                数据来源与校勘信息（点击展开）
              </summary>
              <div style={{ marginTop:10, padding:"12px 14px", background:"#F5F0E8",
                border:"1px solid #E8DCC8", borderRadius:6 }}>
                <div style={{ display:"grid", gridTemplateColumns:"max-content minmax(0,1fr)",
                  columnGap:14, rowGap:8, fontSize:11, lineHeight:1.6 }}>
                  {entries.map(([label, value]) => (
                    <React.Fragment key={label}>
                      <span style={{ color:"#8B7355" }}>{label}</span>
                      <span style={{ color:"#3D261A", fontFamily:"'JetBrains Mono',monospace",
                        overflowWrap:"anywhere" }}>{value}</span>
                    </React.Fragment>
                  ))}
                </div>
                <details style={{ marginTop:10 }}>
                  <summary style={{ fontSize:10, color:"#A09080", cursor:"pointer" }}>
                    查看原始导入标识
                  </summary>
                  <div style={{ marginTop:6, fontFamily:"'JetBrains Mono',monospace",
                    fontSize:10, color:"#6D5A4A", overflowWrap:"anywhere" }}>

                  active={selectionMatches(selections, "uncategorized")}
                  count={uncategorized.length}
                  onClick={() => onSelect({ level:"uncategorized" })}>
                  待归类
                </CompactCategoryButton>

                minWidth:220,
                flex:"0 1 280px",
                border:"1px solid #E8DCC8",
                borderRadius:20,
                padding:"6px 12px",
                background:"#FFFCF7",
                color:"#3D261A",

                fontSize:12,

                      color={cat.color}

      );

    // ── 主应用 ──
    function App() {
      const [tab, setTab] = useState("search");
      const formatCount = value => Number.isFinite(value) ? value.toLocaleString("zh-CN") : "—";

      // ── 文献浏览状态 ──
      const [chapters, setChapters] = useState([]);
      const [chaptersLoading, setChaptersLoading] = useState(true);
      const [selChapter, setSelChapter] = useState(null);
      const [chapterLines, setChapterLines] = useState([]);
      const [chapterLinesLoading, setChapterLinesLoading] = useState(false);
      const [archiveSelections, setArchiveSelections] = useState([]);
      const [archiveDocQuery, setArchiveDocQuery] = useState("");

      // ── 搜索状态 ──
      const [q, setQ] = useState("");
      const [searchResults, setSearchResults] = useState(null);
      const [searchLoading, setSearchLoading] = useState(false);
      const [resultCount, setResultCount] = useState(0);
      const [selectedSearchChapters, setSelectedSearchChapters] = useState([]);
      const searchTimer = useRef(null);
      const [selectedAlignment, setSelectedAlignment] = useState(null);
      const [viewHistory, setViewHistory] = useState([]);

      // ── 统计 ──
      const [corpusStats, setCorpusStats] = useState({
        documentCount: 0,
        lineCount: 0,
        sectionCount: 0,
        sourceFileCount: 0
      });

      // ── 初始化：加载章节列表 ──
      useEffect(() => {
        (async () => {
          try {
            // 获取所有行并在前端聚合章节信息
            const data = await fetchAllRows("alignments", {
              select: "chapter,section,source_file,notes",
            });
            // 聚合成章节列表
            const chapMap = {};
            const sourceFiles = new Set();
            const sectionKeys = new Set();
            data.forEach(row => {
              const chapter = row.chapter || "未命名文献";
              const section = row.section || "未分类";
              const sourceFile = row.source_file || "未标注文献源";
              const corpusId = inferDocumentCorpus(chapter, [sourceFile], [row.notes || ""]);
              const chapterKey = `${corpusId}|||${chapter}`;
              if (!chapMap[chapterKey]) {
                chapMap[chapterKey] = { chapter, corpusId, sections: new Set(), sources: new Set(), count: 0 };
              }
              chapMap[chapterKey].sections.add(section);
              chapMap[chapterKey].sources.add(sourceFile);
              chapMap[chapterKey].count++;
              sourceFiles.add(sourceFile);
              sectionKeys.add(`${chapterKey}|||${section}`);
            });
            const chapList = Object.values(chapMap).map(c => ({
              ...c,
              sections: [...c.sections].sort((a, b) => a.localeCompare(b, undefined, { numeric: true })),
              sources: [...c.sources].sort((a, b) => a.localeCompare(b, undefined, { numeric: true }))
            })).sort((a, b) => {
              const minA = a.sources[0] || "";
              const minB = b.sources[0] || "";
              return minA.localeCompare(minB, undefined, { numeric: true });
            });
            setChapters(chapList);
            setCorpusStats({
              documentCount: chapList.length,
              lineCount: data.length,
              sectionCount: sectionKeys.size,
              sourceFileCount: sourceFiles.size
            });
            setChaptersLoading(false);
          } catch (e) {
            console.error("Failed to load chapters:", e);
            setChaptersLoading(false);
          }
        })();
      }, []);

      // ── 搜索（防抖 500ms）──
      useEffect(() => {
        if (!q.trim()) {
          setSearchResults(null);
          setSelectedSearchChapters([]);
          setSearchLoading(false);
          return;
        }
        setSearchLoading(true);
        if (searchTimer.current) clearTimeout(searchTimer.current);
        searchTimer.current = setTimeout(async () => {
          try {
            const data = await sb.rpc("search_corpus", { query_text: q.trim() });
            setSearchResults(data);
            setResultCount(data.length);
            setSelectedSearchChapters([]);
          } catch (e) {
            console.error("Search failed:", e);
            setSearchResults([]);
            setSelectedSearchChapters([]);
          }
          setSearchLoading(false);
        }, 500);
        return () => { if (searchTimer.current) clearTimeout(searchTimer.current); };
      }, [q]);

      const captureCurrentView = useCallback(() => ({
        tab,
        selChapter,
        selectedAlignment,
        q,
        selectedSearchChapters,
        scrollY: window.scrollY || 0
      }), [tab, selChapter, selectedAlignment, q, selectedSearchChapters]);

      const pushCurrentView = useCallback(() => {
        const view = captureCurrentView();
        setViewHistory(prev => [...prev, view]);
      }, [captureCurrentView]);

      const restoreView = useCallback((view) => {
        setTab(view.tab || "search");
        setSelChapter(view.selChapter || null);
        setSelectedAlignment(view.selectedAlignment || null);
        setSelectedSearchChapters(view.selectedSearchChapters || []);
        setQ(view.q || "");
        requestAnimationFrame(() => {
          window.scrollTo({ top: view.scrollY || 0, behavior: "auto" });
        });
      }, []);

      // ── 点击章节加载全部行 ──
      const openChapter = useCallback(async (chap) => {
        pushCurrentView();
        const chapterName = chap.chapter || "未命名文献";
        const corpusId = chap.corpusId || "unknown";
        setSelChapter({
          chapter: chapterName,
          corpusId,
          count: chap.count || 0,
          sources: chap.sources || [],
          sections: chap.sections || []
        });
        setSelectedAlignment(null);
        setTab("archive");
        setChapterLines([]);
        setChapterLinesLoading(true);
        requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: "auto" }));
        try {
          const data = await fetchAllRows("alignments", {
            filters: { chapter: chapterName },
            order: "source_file.asc,physical_line.asc"
          });
          const scopedData = corpusId === "unknown"
            ? data
            : data.filter(row =>
                inferDocumentCorpus(row.chapter || chapterName, [row.source_file || ""], [row.notes || ""]) === corpusId
              );
          setChapterLines(scopedData);
          const sources = [...new Set(scopedData.map(row => row.source_file || "未标注文献源"))]
            .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          const sections = [...new Set(scopedData.map(row => row.section || "未分类"))]
            .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          setSelChapter({ chapter: chapterName, corpusId, count: scopedData.length, sources, sections });
        } catch (e) {
          console.error("Failed to load chapter lines:", e);
        }
        setChapterLinesLoading(false);
        requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: "auto" }));
      }, [pushCurrentView]);

      const openChapterByName = useCallback((chapterRef) => {
        const chapterName = typeof chapterRef === "string" ? chapterRef : chapterRef?.chapter;
        if (!chapterName) return;
        const inferredCorpus = typeof chapterRef === "string"
          ? null
          : inferDocumentCorpus(chapterName, [chapterRef.source_file || ""], [chapterRef.notes || ""]);
        const chap = chapters.find(item => item.chapter === chapterName && (!inferredCorpus || item.corpusId === inferredCorpus))
          || chapters.find(item => item.chapter === chapterName)
          || {
          chapter: chapterName,
          corpusId: inferredCorpus || "unknown",
          count: 0,
          sources: [],
          sections: []
        };
        openChapter(chap);
      }, [chapters, openChapter]);

      const openAlignmentDetail = useCallback((row) => {
        pushCurrentView();
        setSelectedAlignment(row);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, [pushCurrentView]);

      const closeAlignmentDetail = useCallback(() => {
        setSelectedAlignment(null);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, []);

      const resetSearchHome = useCallback(() => {
        setQ("");
        setSearchResults(null);
        setResultCount(0);
        setSelectedSearchChapters([]);
        setSelectedAlignment(null);
        setTab("search");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, []);

      const goBack = useCallback(() => {
        const previous = viewHistory[viewHistory.length - 1];
        if (previous) {
          setViewHistory(prev => prev.slice(0, -1));
          restoreView(previous);
          return;
        }
        if (selectedAlignment) {
          setSelectedAlignment(null);
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }
        if (selChapter) {
          setSelChapter(null);
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }
        if (q.trim()) resetSearchHome();
      }, [viewHistory, restoreView, selectedAlignment, selChapter, q, resetSearchHome]);

      // ── ESC 返回 ──
      useEffect(() => {
        const fn = e => {
          if (e.key === "Escape") {
            goBack();
          }
        };
        window.addEventListener("keydown", fn);
        return () => window.removeEventListener("keydown", fn);
      }, [goBack]);

      // 按 section 分组
      const linesBySection = useMemo(() => {
        const groups = {};
        chapterLines.forEach(line => {
          const sec = line.section || "未分类";
          if (!groups[sec]) groups[sec] = [];
          groups[sec].push(line);
        });
        return groups;
      }, [chapterLines]);

      const archiveCategoryData = useMemo(() => buildImportedCategoryTree(chapters), [chapters]);

      const selectArchiveCategory = useCallback((selection) => {
        if (selection.level === "all") {
          setArchiveSelections([]);
          setArchiveDocQuery("");
          return;
        }
        setArchiveSelections(prev => updateArchiveSelections(prev, selection));
        setArchiveDocQuery("");
      }, []);

      const archiveListContext = useMemo(() => {
        const { tree, uncategorized } = archiveCategoryData;
        const groups = [];
        const listed = new Set();
        let breadcrumb = ["全部文献"];
        const addGroup = (label, docs) => {
          const unique = uniqueDocs(docs || []).filter(doc => {
            const key = getDocumentKey(doc);
            if (listed.has(key)) return false;
            listed.add(key);
            return true;
          });
          if (unique.length > 0) groups.push({ label, docs: unique });
        };
        const addSelection = (selection) => {
          if (selection.level === "cat") {
            const cat = tree.find(item => item.id === selection.catId);
            if (cat) addGroup(cat.name, getCatDocs(cat));
            return;
          }
          if (selection.level === "sub") {
            const cat = tree.find(item => item.id === selection.catId);
            const sub = cat?.subs?.[selection.subIndex];
            if (cat && sub) addGroup(`${cat.name} · ${sub.name}`, getSubDocs(sub));
            return;
          }
          if (selection.level === "group") {
            const cat = tree.find(item => item.id === selection.catId);
            const sub = cat?.subs?.[selection.subIndex];
            const group = sub?.groups?.[selection.groupIndex];
            if (cat && sub && group) addGroup(`${cat.name} · ${sub.name} · ${group.name}`, group.docs);
            return;
          }
          if (selection.level === "uncategorized") {
            addGroup("待归类", uncategorized);
          }
        };
        const selectionPath = (selection) => {
          if (selection.level === "cat") {
            const cat = tree.find(item => item.id === selection.catId);
            return cat ? ["全部文献", cat.name] : ["全部文献"];
          }
          if (selection.level === "sub") {
            const cat = tree.find(item => item.id === selection.catId);
            const sub = cat?.subs?.[selection.subIndex];
            return cat && sub ? ["全部文献", cat.name, sub.name] : ["全部文献"];
          }
          if (selection.level === "group") {
            const cat = tree.find(item => item.id === selection.catId);
            const sub = cat?.subs?.[selection.subIndex];
            const group = sub?.groups?.[selection.groupIndex];
            return cat && sub && group ? ["全部文献", cat.name, sub.name, group.name] : ["全部文献"];
          }
          if (selection.level === "uncategorized") return ["全部文献", "待归类"];
          return ["全部文献"];
        };

        if (archiveSelections.length === 0) {
          tree.forEach(cat => addGroup(cat.name, getCatDocs(cat)));
          if (uncategorized.length > 0) addGroup("待归类", uncategorized);
        } else {
          breadcrumb = archiveSelections.length === 1 ? selectionPath(archiveSelections[0]) : ["全部文献", `已选择 ${archiveSelections.length} 个分类`];
          archiveSelections.forEach(addSelection);
        }

        const keyword = archiveDocQuery.trim();
        const filteredGroups = groups.map(group => ({
          ...group,
          docs: group.docs.filter(doc => {
            if (!keyword) return true;
            return String(doc.chapter || "").includes(keyword)
              || String(doc.taxonomyName || "").includes(keyword);
          })
        })).filter(group => group.docs.length > 0);

        return {
          groups: filteredGroups,
          breadcrumb,
          visibleDocs: uniqueDocs(filteredGroups.flatMap(group => group.docs))
        };
      }, [archiveCategoryData, archiveSelections, archiveDocQuery]);

      const selectedSearchChapterSet = useMemo(
        () => new Set(selectedSearchChapters),
        [selectedSearchChapters]
      );

      // 搜索结果中的文献胶囊筛选器
      const searchDocumentFilters = useMemo(() => {
        if (!searchResults || searchResults.length === 0) return [];
        const docMap = new Map();
        searchResults.forEach((row, idx) => {
          const chapter = row.chapter || "未命名文献";
          const corpusId = inferDocumentCorpus(chapter, [row.source_file || ""], [row.notes || ""]);
          const key = `${corpusId}|||${chapter}`;
          if (!docMap.has(key)) {
            docMap.set(key, { key, chapter, corpusId, count: 0, firstIndex: idx });
          }
          docMap.get(key).count++;
        });
        return [...docMap.values()].sort((a, b) =>
          b.count - a.count || a.firstIndex - b.firstIndex
        );
      }, [searchResults]);

      const visibleSearchResults = useMemo(() => {
        if (!searchResults) return null;
        if (selectedSearchChapters.length === 0) return searchResults;
        return searchResults.filter(row => {
          const chapter = row.chapter || "未命名文献";
          const corpusId = inferDocumentCorpus(chapter, [row.source_file || ""], [row.notes || ""]);
          return selectedSearchChapterSet.has(`${corpusId}|||${chapter}`);
        });
      }, [searchResults, selectedSearchChapters.length, selectedSearchChapterSet]);

      const toggleSearchChapterFilter = useCallback((chapterKey) => {
        setSelectedSearchChapters(prev =>
          prev.includes(chapterKey)
            ? prev.filter(item => item !== chapterKey)
            : [...prev, chapterKey]
        );
      }, []);

      // 搜索结果中的唯一 Gardiner 符号统计
      const gardinerStats = useMemo(() => {
        if (!visibleSearchResults || visibleSearchResults.length === 0) return [];
        const counts = {};
        visibleSearchResults.forEach(r => {
          (r.search_gardiner || "").split(/\s+/).filter(Boolean).forEach(g => {
            if (g === "\\t") return;
            counts[g] = (counts[g] || 0) + 1;
          });
        });
        return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 20);
      }, [visibleSearchResults]);

      return (
        <div style={{ fontFamily:"'Cormorant Garamond',Georgia,serif", minHeight:"100vh", color:"#2C1810" }}>

          {/* ══════ HEADER ══════ */}
          <div style={{ background:"linear-gradient(135deg,#2C1810 0%,#3D261A 50%,#1A0F0A 100%)",
            color:"#E8DCC8", padding:"28px 24px 24px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"relative", display:"flex", justifyContent:"space-between",
              alignItems:"center", maxWidth:1000, margin:"0 auto" }}>
              <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                <img src="logo.png" alt="Logo" style={{ width:80, height:80 }} />
                <div>
                  <div style={{ fontSize:26, fontWeight:700, letterSpacing:"0.04em" }}>
                    上海大学埃及学研究中心数据库
                  </div>
                  <div style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace", color:"#C4956A",
                    letterSpacing:"0.15em", marginTop:4 }}>
                    DATABASE OF THE CENTER FOR EGYPTOLOGY, SHANGHAI UNIVERSITY
                  </div>
                </div>
              </div>
              <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:13, color:"#8B7355",
                letterSpacing:"0.05em", textAlign:"right" }}>
                <div>{formatCount(corpusStats.documentCount)} 篇文献 · {formatCount(corpusStats.lineCount)} 行</div>
                <div style={{ color:"#C4956A", marginTop:4, fontSize:11 }}>
                  {formatCount(corpusStats.sectionCount)} 个小节 · {formatCount(corpusStats.sourceFileCount)} 个来源文件
                </div>
                <div style={{ color:"#C4956A", marginTop:4, fontSize:11 }}>SUPABASE LIVE</div>
              </div>
            </div>
          </div>

          {/* ══════ NAV ══════ */}
          <nav style={{ background:"#2C1810", position:"sticky", top:0, zIndex:100,
            borderBottom:"2px solid #C4956A30" }}>
            <div style={{ maxWidth:1000, margin:"0 auto", display:"flex" }}>
              {[
                ["search", "全文检索"],
                ["archive", "文献浏览"],
                ["parallel", "平行文本"],
                ["restore", "文本修复"]
              ].map(([k, l]) =>
                <button key={k} onClick={() => { setTab(k); setSelectedAlignment(null); }} style={{
                  padding:"16px 24px", background:"transparent", border:"none",
                  borderBottom: tab === k ? "2px solid #C4956A" : "2px solid transparent",
                  color: tab === k ? "#E8DCC8" : "#8B7355", fontSize:13,
                  fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.05em",
                  cursor:"pointer", whiteSpace:"nowrap"
                }}>{l}</button>
              )}
            </div>
          </nav>

          <div style={{ maxWidth:1000, margin:"0 auto", padding:"30px 16px" }}>

            {selectedAlignment && (
              <AlignmentDetail row={selectedAlignment}
                onBack={goBack}
                onOpenChapter={openChapterByName} />
            )}

            {/* ═══════════════════ 全文检索 TAB ═══════════════════ */}
            {!selectedAlignment && tab === "search" && (
              <>
                {q.trim() && (
                  <button onClick={resetSearchHome} style={{ background:"none",
                    border:"none", color:"#C4956A", fontSize:13,
                    fontFamily:"'JetBrains Mono',monospace", cursor:"pointer", padding:0,
                    marginBottom:18, textDecoration:"underline" }}>
                    ← 返回
                  </button>
                )}

                {/* 搜索框 */}
                <div style={{ marginBottom:28 }}>
                  <div style={{ fontSize:13, fontFamily:"'JetBrains Mono',monospace",
                    color:"#8B7355", marginBottom:10, letterSpacing:"0.06em" }}>
                    支持文献名 · 拉丁转写 · 中文翻译 · Gardiner 编码检索
                  </div>
                  <input
                    className="search-input"
                    value={q}
                    onChange={e => setQ(e.target.value)}
                    placeholder="输入检索词：如 Imn、赫拉姆海布、G5 S3、anx、敕令、mAat ……"
                    style={S.input}
                  />
                  {q.trim() && !searchLoading && searchResults && (
                    <div>
                      <div style={{ marginTop:10, fontFamily:"'JetBrains Mono',monospace",
                        fontSize:12, color:"#C4956A", letterSpacing:"0.05em" }}>
                        找到 {resultCount} 条匹配结果
                        {selectedSearchChapters.length > 0 && visibleSearchResults
                          ? ` · 当前显示 ${visibleSearchResults.length} 条`
                          : ""}
                      </div>
                      {searchDocumentFilters.length > 0 && (
                        <div style={{ display:"flex", flexWrap:"wrap", gap:9, marginTop:12 }}>
                          {searchDocumentFilters.map(doc => {
                            const active = selectedSearchChapterSet.has(doc.key);
                            return (
                              <button
                                key={doc.key}
                                type="button"
                                onClick={() => toggleSearchChapterFilter(doc.key)}
                                style={{
                                  border:`1px solid ${active ? "#C4956A" : "#C4956A35"}`,
                                  background: active ? "#C4956A40" : "#C4956A14",
                                  color: active ? "#4A2A18" : "#9A7658",
                                  borderRadius:999,
                                  padding:"7px 15px",
                                  fontSize:15,
                                  lineHeight:1.25,
                                  fontFamily:"'Noto Serif SC','Cormorant Garamond',serif",
                                  fontWeight: active ? 600 : 500,
                                  letterSpacing:"0.02em",
                                  cursor:"pointer",
                                  boxShadow: active ? "0 2px 10px rgba(196,149,106,0.18)" : "none",
                                  transition:"all 0.16s ease"
                                }}
                                title={`点击${active ? "取消筛选" : "只显示"}「${doc.chapter}」`}>
                                {doc.chapter} · {doc.count}
                              </button>
                            );
                          })}
                          {selectedSearchChapters.length > 0 && (
                            <button
                              type="button"
                              onClick={() => setSelectedSearchChapters([])}
                              style={{ border:"1px solid #8B735530", background:"#8B735510",
                                color:"#8B7355", borderRadius:999, padding:"7px 15px",
                                fontSize:15, lineHeight:1.25,
                                fontFamily:"'Noto Serif SC','Cormorant Garamond',serif",
                                cursor:"pointer" }}>
                              清除选择
                            </button>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* 搜索结果 */}
                {!q.trim() ? (
                  <EmptyState
                    title="全文语料检索 (Full-Text Corpus Search)"
                    msg="输入任意拉丁转写、中文词句或 Gardiner 编码，即可在全部语料中定位匹配段落"
                  />
                ) : searchLoading ? (
                  <Spinner label="Searching corpus..." />
                ) : searchResults && searchResults.length === 0 ? (
                  <EmptyState title="未找到匹配结果" msg={`语料中未检索到「${q}」`} />
                ) : searchResults ? (
                  <>
                    {/* Gardiner 符号频率（仅在 Gardiner 搜索时有意义） */}
                    {gardinerStats.length > 0 && visibleSearchResults.some(r => r.match_field === "search_gardiner") && (
                      <div style={{ marginBottom:20, padding:"14px 18px", background:"#F5F0E8",
                        borderRadius:8, border:"1px solid #E8DCC8" }}>
                        <div style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace",
                          color:"#8B7355", marginBottom:8, letterSpacing:"0.1em" }}>
                          结果中高频 GARDINER 符号
                        </div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                          {gardinerStats.map(([g, c]) =>
                            <span key={g} style={{ fontFamily:"'JetBrains Mono',monospace",
                              fontSize:10, color:"#6A1B9A", background:"#F3E5F5",
                              padding:"3px 8px", borderRadius:4,
                              border:"1px solid #CE93D830" }}>
                              {g} ×{c}
                            </span>
                          )}
                        </div>
                      </div>
                    )}
                    {visibleSearchResults.map((row, idx) =>
                      <AlignmentCard key={row.id} row={row} idx={idx} showChapter={true}
                        query={q} onOpenDetail={openAlignmentDetail}
                        onOpenChapter={openChapterByName} />
                    )}
                  </>
                ) : null}
              </>
            )}

            {/* ═══════════════════ 文献浏览 TAB ═══════════════════ */}
            {!selectedAlignment && tab === "archive" && (
              <>
                {selChapter ? (
                  // ── 章节详情 ──
                  <div>
                    <button onClick={goBack} style={{ background:"none",
                      border:"none", color:"#C4956A", fontSize:13,
                      fontFamily:"'JetBrains Mono',monospace", cursor:"pointer", padding:0,
                      marginBottom:20, textDecoration:"underline" }}>
                      ← 返回
                    </button>

                    <div style={{ background:"#FFFCF7", border:"1px solid #E8DCC8",
                      borderRadius:8, padding:"24px 30px", marginBottom:24 }}>
                      <h2 style={{ fontSize:30, fontWeight:600, margin:"0 0 14px", color:"#3D261A", fontFamily:"'Noto Serif SC',serif" }}>
                        {selChapter.chapter}
                      </h2>
                      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:16 }}>
                        <div>
                          <div style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace",
                            color:"#8B7355", marginBottom:4 }}>文本行数</div>
                          <div style={{ fontSize:15, fontWeight:500 }}>{selChapter.count} 行</div>
                        </div>
                        <div>
                          <div style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace",
                            color:"#8B7355", marginBottom:4 }}>来源文件</div>
                          <div style={{ fontSize:15, fontWeight:500 }}>{selChapter.sources.length} 个</div>
                        </div>
                        <div>
                          <div style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace",
                            color:"#8B7355", marginBottom:4 }}>包含小节</div>
                          <div style={{ fontSize:15, fontWeight:500 }}>{selChapter.sections.length} 个</div>
                        </div>
                      </div>
                      <CollapsedMetadataList label="源文件编号" items={selChapter.sources} color="#C4956A" />
                      <CollapsedMetadataList label="包含小节" items={selChapter.sections} color="#7B9E87" />
                    </div>

                    {/* 按 section 分组显示行 */}
                    {chapterLinesLoading ? <Spinner label="Loading text lines..." /> : (
                      Object.entries(linesBySection).map(([sec, lines]) => (
                        <div key={sec}>
                          <div style={S.section}>{sec} ({lines.length} 行)</div>
                          {lines.map((line, idx) =>
                            <AlignmentCard key={line.id} row={line} idx={idx}
                              showChapter={false} query="" onOpenDetail={openAlignmentDetail} />
                          )}
                        </div>
                      ))
                    )}
                  </div>
                ) : (
                  // ── 章节列表 ──
                  <>
                    {/* 统计 */}
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12,
                      marginBottom:30 }}>
                      {[
                        [corpusStats.documentCount, "文献篇数"],
                        [corpusStats.lineCount, "文本总行数"],
                        [corpusStats.sectionCount, "小节数量"],
                        [corpusStats.sourceFileCount, "来源文件数"]
                      ].map(([v, l], i) =>
                        <div key={i} style={{ background:"#2C1810", borderRadius:8,
                          padding:"20px", textAlign:"center" }}>
                          <div style={{ fontSize:28, fontWeight:700, color:"#C4956A" }}>
                            {formatCount(v)}
                          </div>
                          <div style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace",
                            color:"#8B7355", marginTop:6, letterSpacing:"0.1em" }}>{l}</div>
                        </div>
                      )}
                    </div>

                    <div style={S.section}>文献目录 (DOCUMENT INDEX)</div>

                    {chaptersLoading ? <Spinner label="Loading documents..." /> : (
                      <>
                        <ArchiveCategoryIndex
                          tree={archiveCategoryData.tree}
                          uncategorized={archiveCategoryData.uncategorized}
                          selections={archiveSelections}
                          archiveDocQuery={archiveDocQuery}
                          onQueryChange={setArchiveDocQuery}
                          onSelect={selectArchiveCategory}
                          totalDocs={chapters.length}
                          visibleDocs={archiveListContext.visibleDocs}
                          breadcrumb={archiveListContext.breadcrumb}
                        />

                        {archiveListContext.groups.length === 0 ? (
                          <EmptyState title="当前分类下暂无文献" msg="没有找到已导入且匹配当前筛选条件的文献" />
                        ) : (
                          archiveListContext.groups.map((group, groupIndex) => (
                            <div key={group.label}>
                              <div style={{ ...S.section, marginTop: groupIndex === 0 ? 14 : 20 }}>
                                {group.label}（{group.docs.length} 篇）
                              </div>
                              {group.docs.map((chap, idx) => (
                                <div key={`${group.label}-${getDocumentKey(chap)}`} className="card-anim hover-card"
                                  style={{ background:"#FFFCF7", border:"1px solid #E8DCC8",
                                    borderRadius:8, padding:"18px 22px", marginBottom:12,
                                    cursor:"pointer", animationDelay:`${Math.min(idx, 10) * 0.035}s` }}
                                  onClick={() => openChapter(chap)}>
                                  <div style={{ display:"flex", justifyContent:"space-between",
                                    alignItems:"flex-start", gap:16 }}>
                                    <div>
                                      <h3 style={{ fontSize:22, fontWeight:600, margin:"0 0 10px",
                                        color:"#3D261A", fontFamily:"'Noto Serif SC',serif" }}>{chap.chapter}</h3>
                                      <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
                                        <span style={S.tag("#C4956A")}>{chap.sources.length} 个来源文件</span>
                                        <span style={S.tag("#7B9E87")}>{chap.sections.length} 个小节</span>
                                      </div>
                                    </div>
                                    <div style={{ textAlign:"right", flexShrink:0 }}>
                                      <div style={{ fontSize:24, fontWeight:700, color:"#C4956A" }}>
                                        {chap.count}
                                      </div>
                                      <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10,
                                        color:"#A09080", letterSpacing:"0.1em" }}>LINES</div>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          ))
                        )}
                      </>
                    )}
                  </>
                )}
              </>
            )}

            {/* ═══ 占位 TAB ═══ */}
            {!selectedAlignment && tab === "parallel" && (
              <EmptyState title="平行文本 (Parallel Text Retrieval)"
                msg={"功能开发中 · 将采用 Tesserae 式 n-gram 匹配与罕见度加权\n结合 FastText / Word2Vec 转写向量、pgvector 余弦相似度检索"} />
            )}

            {!selectedAlignment && tab === "restore" && (
              <EmptyState title="文本修复 (Masked Language Restoration)"
                msg="功能开发中 · 需要字符级 Masked LM 模型支持" />
            )}
          </div>

          {/* ══════ FOOTER ══════ */}
          <div style={{ textAlign:"center", padding:"30px", borderTop:"1px solid #E8DCC8",
            fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:"#A09080",
            letterSpacing:"0.15em" }}>
            上海大学埃及学研究中心数据库 · DATABASE OF THE CENTER FOR EGYPTOLOGY, SHANGHAI UNIVERSITY · SUPABASE LIVE
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
